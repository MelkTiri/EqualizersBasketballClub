    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f0f0f0; text-align: center; }
        header { background-color: #0033a0; color: #ffcc00; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 4px solid #ffcc00; }
        header img { height: 60px; }

        /* The Tab Menu Styles */
        nav { background-color: #002b80; display: flex; padding: 0 40px; justify-content: center; border-top: 4px solid #ffcc00; }
        nav button { background: none; border: none; color: white; padding: 15px 30px; cursor: pointer; font-size: 18px; font-weight: bold; border-bottom: 4px solid transparent; transition: 0.3s; }
        nav button:hover { color: #ffcc00; }
        .active-btn { color: #ffcc00 !important; border-bottom: 4px solid #ffcc00 !important; }

        h1.section-title { font-size: 28px; background-color: #002b80; color: #ffcc00; padding: 15px; margin: 20px auto; width: 80%; border: 4px solid black; }

        .gallery-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .gallery-item { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .gallery-item img { width: 100%; height: 300px; object-fit: cover; border-radius: 5px; }
        .gallery-item p { margin-top: 10px; font-weight: bold; color: #0033a0; }
    </style>
</head>
